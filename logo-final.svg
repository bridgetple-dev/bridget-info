    </filter>
  </defs>
  <circle cx="256" cy="256" r="230" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="230" fill="url(#shine)"/>
  <!-- 4-point star: tips at circle edge (256±230 = 26 and 486) -->
  <path d="M256 26 C268 220, 292 244, 486 256 C292 268, 268 292, 256 486 C244 292, 220 268, 26 256 C220 244, 244 220, 256 26Z" fill="white" filter="url(#glow)"/>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge Build Animation</title>
<style>
*{margin:0;padding:0}
body{background:#000;height:100vh;overflow:hidden;cursor:grab}
canvas{position:fixed;inset:0;display:block}
#info{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.25);font:12px/1 'SF Mono',monospace;letter-spacing:2px;pointer-events:none;transition:opacity 1s}
</style>
</head>
<body>
<canvas id="bridge-canvas"></canvas>
<div id="info">BUILDING...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const canvas = document.getElementById('bridge-canvas');
  const R = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  R.setSize(innerWidth, innerHeight);
  R.setPixelRatio(Math.min(devicePixelRatio, 2));
  R.setClearColor(0x020306, 1);
  R.toneMapping = THREE.ACESFilmicToneMapping;
  R.toneMappingExposure = 0.85;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x020306, 0.004);

  const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 500);
  camera.position.set(0, 5, 100);

  // ═══════════════════════════════════════════════
  // SHARED DEFINITIONS
  // ═══════════════════════════════════════════════
  const AB = THREE.AdditiveBlending;
  const DS = THREE.DoubleSide;
  function gMat(color, op){ return new THREE.MeshBasicMaterial({ color, transparent:true, opacity:op, blending:AB, depthWrite:false, side:DS }); }
  function eMat(color, op){ return new THREE.LineBasicMaterial({ color, transparent:true, opacity:op, blending:AB, depthWrite:false }); }

  const particleVS = `
    attribute float aSize;
    attribute vec3 aColor;
    attribute float aAlpha;
    varying vec3 vColor;
    varying float vAlpha;
    void main(){
      vColor = aColor;
      vAlpha = aAlpha;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = aSize * (160.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }`;
  const particleFS = `
    varying vec3 vColor;
    varying float vAlpha;
    void main(){
      float d = length(gl_PointCoord - 0.5);
      float glow = exp(-d * d * 6.0);
      float core = smoothstep(0.4, 0.0, d);
      gl_FragColor = vec4(vColor, (glow * 0.55 + core * 0.45) * vAlpha);
    }`;
  function makeParticleMat(){
    return new THREE.ShaderMaterial({
      vertexShader: particleVS, fragmentShader: particleFS,
      transparent:true, blending:AB, depthWrite:false
    });
  }

  const bridgeGroup = new THREE.Group();
  scene.add(bridgeGroup);

  const bridgeMats = [];
  let _curPhase = 0, _subIdx = 0;
  function trackMat(m){ bridgeMats.push({ mat:m, base:m.opacity, phase:_curPhase, sub:_subIdx++ }); return m; }

  // ═══════════════════════════════════════════════
  // STAR-BRIDGE DIMENSIONS
  // ═══════════════════════════════════════════════
  const starR = 45;
  const sS = starR / 230; // scale from SVG 230-unit coords
  const buildTargets = [];
  const palette = [[.69,.48,1],[.53,.33,.87],[.80,.55,1],[.47,.27,.80],[.75,.45,.95],[.83,.63,1]];
  const globeR = 45; // same as starR → tips touch globe surface

  // Cubic bezier helper
  function cubicBez(p0,p1,p2,p3,t){
    const mt=1-t;
    return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
  }
  // SVG star path segments (centered, Y-flipped for 3D)
  const starBez = [
    [0,230, 12,36, 36,12, 230,0],       // top → right
    [230,0, 36,-12, 12,-36, 0,-230],     // right → bottom
    [0,-230, -12,-36, -36,-12, -230,0],  // bottom → left
    [-230,0, -36,12, -12,36, 0,230]      // left → top
  ];
  function sampleBez(b,n){
    const pts=[];
    for(let i=0;i<=n;i++){
      const t=i/n;
      pts.push(new THREE.Vector3(
        cubicBez(b[0],b[2],b[4],b[6],t)*sS,
        cubicBez(b[1],b[3],b[5],b[7],t)*sS, 0));
    }
    return pts;
  }

  // ═══════════════════════════════════════════════
  // HELPER: add mesh + edge wireframe overlay
  // ═══════════════════════════════════════════════
  const buildElems = [];
  let _groupSub = -1;
  function groupStart(){ _groupSub = _subIdx; _subIdx++; }
  function groupEnd(){ _groupSub = -1; }
  function addSolid(geo, color, solidOp, edgeOp, pos, rot){
    const grp = new THREE.Group();
    if(pos) grp.position.set(pos.x, pos.y, pos.z);
    if(rot) grp.rotation.set(rot.x||0, rot.y||0, rot.z||0);
    const sm = gMat(color, solidOp);
    grp.add(new THREE.Mesh(geo, sm));
    const mats = [{mat:sm, base:solidOp}];
    if(edgeOp > 0){
      const em = eMat(color, edgeOp);
      grp.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), em));
      mats.push({mat:em, base:edgeOp});
    }
    bridgeGroup.add(grp);
    const sub = _groupSub >= 0 ? _groupSub : _subIdx++;
    buildElems.push({grp, mats, origY: pos ? pos.y : 0, phase:_curPhase, sub});
    return grp;
  }
  function addCableLine(pts, color, solidOp, edgeOp){
    const curve = new THREE.CatmullRomCurve3(pts);
    const geo = new THREE.TubeGeometry(curve, pts.length, 0.04, 6, false);
    addSolid(geo, color, solidOp, edgeOp, null, null);
    const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
    const lm = trackMat(eMat(color, edgeOp * 1.5));
    bridgeGroup.add(new THREE.Line(lineGeo, lm));
    pts.forEach(p => { if(Math.random()<0.3) buildTargets.push(p.x, p.y, p.z); });
    return pts;
  }

  // ═══════════════════════════════════════════════
  // STAR-BRIDGE STRUCTURE
  // ═══════════════════════════════════════════════

  // Phase 1: Central hub (junction of all spines)
  _curPhase = 0.01;
  addSolid(new THREE.OctahedronGeometry(2.5, 0), 0x8855dd, 0.06, 0.30, {x:0,y:0,z:0});
  buildTargets.push(0, 0, 0);

  // Phase 2: Foundation spine (center → bottom tip)
  _curPhase = 0.04;
  groupStart();
  addSolid(new THREE.CylinderGeometry(0.8, 0.15, starR, 8),
    0x8855dd, 0.05, 0.25, {x:0, y:-starR/2, z:0});
  addSolid(new THREE.CylinderGeometry(0.5, 0.08, starR, 6),
    0xb07aff, 0.03, 0, {x:0, y:-starR/2, z:0});
  groupEnd();
  for(let y=0; y>-starR; y-=3) buildTargets.push(0, y, 0);

  // Phase 3: Tower spine (center → top tip)
  _curPhase = 0.08;
  groupStart();
  addSolid(new THREE.CylinderGeometry(0.15, 0.8, starR, 8),
    0x8855dd, 0.06, 0.30, {x:0, y:starR/2, z:0});
  addSolid(new THREE.CylinderGeometry(0.08, 0.5, starR, 6),
    0xb07aff, 0.04, 0, {x:0, y:starR/2, z:0});
  groupEnd();
  for(let y=0; y<starR; y+=3) buildTargets.push(0, y, 0);

  // Phase 4: Left deck spine
  _curPhase = 0.12;
  addSolid(new THREE.CylinderGeometry(0.15, 0.8, starR, 8),
    0xb07aff, 0.05, 0.25,
    {x:-starR/2, y:0, z:0}, {x:0, y:0, z:Math.PI/2});
  for(let x=0; x>-starR; x-=3) buildTargets.push(x, 0, 0);

  // Phase 5: Right deck spine
  _curPhase = 0.15;
  addSolid(new THREE.CylinderGeometry(0.15, 0.8, starR, 8),
    0xb07aff, 0.05, 0.25,
    {x:starR/2, y:0, z:0}, {x:0, y:0, z:-Math.PI/2});
  for(let x=0; x<starR; x+=3) buildTargets.push(x, 0, 0);

  // Phase 6: Star outline cables (4 bezier curves)
  const allCurves = [];
  _curPhase = 0.25;
  allCurves.push(addCableLine(sampleBez(starBez[0], 40), 0xb07aff, 0.05, 0.25));
  _curPhase = 0.30;
  allCurves.push(addCableLine(sampleBez(starBez[1], 40), 0xb07aff, 0.05, 0.25));
  _curPhase = 0.35;
  allCurves.push(addCableLine(sampleBez(starBez[2], 40), 0xb07aff, 0.05, 0.25));
  _curPhase = 0.40;
  allCurves.push(addCableLine(sampleBez(starBez[3], 40), 0xb07aff, 0.05, 0.25));

  // Phase 7: Concentric star ribs (internal structure, all inside star)
  _curPhase = 0.45;
  [0.12, 0.22, 0.32, 0.42, 0.52, 0.62, 0.72, 0.82, 0.92].forEach(scale => {
    starBez.forEach(b => {
      const pts = [];
      for(let i=0;i<=30;i++){
        const t=i/30;
        pts.push(new THREE.Vector3(
          cubicBez(b[0],b[2],b[4],b[6],t)*sS*scale,
          cubicBez(b[1],b[3],b[5],b[7],t)*sS*scale, 0));
      }
      const lg = new THREE.BufferGeometry().setFromPoints(pts);
      bridgeGroup.add(new THREE.Line(lg, trackMat(eMat(0xb07aff, 0.10))));
    });
  });

  // Phase 8: Radial cross-bracing (connects ribs to outline)
  _curPhase = 0.60;
  starBez.forEach(b => {
    for(let j=1; j<=6; j++){
      const t = j/7;
      const scales = [0, 0.32, 0.52, 0.72, 0.92, 1.0];
      for(let k=0; k<scales.length-1; k++){
        const p1 = new THREE.Vector3(
          cubicBez(b[0],b[2],b[4],b[6],t)*sS*scales[k],
          cubicBez(b[1],b[3],b[5],b[7],t)*sS*scales[k], 0);
        const p2 = new THREE.Vector3(
          cubicBez(b[0],b[2],b[4],b[6],t)*sS*scales[k+1],
          cubicBez(b[1],b[3],b[5],b[7],t)*sS*scales[k+1], 0);
        const lg = new THREE.BufferGeometry().setFromPoints([p1, p2]);
        bridgeGroup.add(new THREE.Line(lg, trackMat(eMat(0xb07aff, 0.03))));
      }
    }
  });

  // Phase 9: Cross beams along spines
  _curPhase = 0.65;
  for(let f=0.2; f<=0.8; f+=0.2){
    const d = starR * f, w = 2.5 * (1-f);
    addSolid(new THREE.BoxGeometry(w, 0.3, 1), 0xb07aff, 0.03, 0.12, {x:0, y:d, z:0});
    addSolid(new THREE.BoxGeometry(w, 0.3, 1), 0xb07aff, 0.03, 0.12, {x:0, y:-d, z:0});
    addSolid(new THREE.BoxGeometry(0.3, w, 1), 0xb07aff, 0.03, 0.12, {x:d, y:0, z:0});
    addSolid(new THREE.BoxGeometry(0.3, w, 1), 0xb07aff, 0.03, 0.12, {x:-d, y:0, z:0});
  }

  // Phase 10: Star fill (translucent surface)
  _curPhase = 0.85;
  const starShape = new THREE.Shape();
  starShape.moveTo(starBez[0][0]*sS, starBez[0][1]*sS);
  starBez.forEach(b => {
    starShape.bezierCurveTo(b[2]*sS,b[3]*sS, b[4]*sS,b[5]*sS, b[6]*sS,b[7]*sS);
  });
  addSolid(new THREE.ShapeGeometry(starShape, 64), 0xb07aff, 0.015, 0, {x:0,y:0,z:0.01});
  buildElems[buildElems.length-1].isFill = true;

  // Phase 11: Tip accents + lights
  _curPhase = 0.90;
  [[0,starR],[starR,0],[0,-starR],[-starR,0]].forEach(([x,y]) => {
    const om = trackMat(gMat(0xb07aff, 0.06));
    const orb = new THREE.Mesh(new THREE.SphereGeometry(1.2, 10, 10), om);
    orb.position.set(x, y, 0);
    bridgeGroup.add(orb);
    const light = new THREE.PointLight(0xb07aff, 0.3, 30);
    light.position.set(x, y, 0);
    bridgeGroup.add(light);
    buildTargets.push(x, y, 0);
  });
  bridgeGroup.add(new THREE.PointLight(0xb07aff, 0.5, 40));

  // ═══════════════════════════════════════════════
  // STAR ENERGY PULSE (particles trace outline)
  // ═══════════════════════════════════════════════
  const pulseN = 70;
  const pulsePos = new Float32Array(pulseN*3);
  const pulseCol = new Float32Array(pulseN*3);
  const pulseSize = new Float32Array(pulseN);
  const pulseAlpha = new Float32Array(pulseN);
  const pulseT = new Float32Array(pulseN);
  const pulseCurveIdx = new Uint8Array(pulseN);

  for(let i=0;i<pulseN;i++){
    pulseT[i] = Math.random();
    pulseCurveIdx[i] = Math.floor(Math.random()*4);
    pulseCol[i*3]=0.69; pulseCol[i*3+1]=0.48; pulseCol[i*3+2]=1;
    pulseSize[i] = 2.5 + Math.random()*3;
    pulseAlpha[i] = 0.35 + Math.random()*0.45;
  }
  const pulseGeo = new THREE.BufferGeometry();
  pulseGeo.setAttribute('position', new THREE.BufferAttribute(pulsePos, 3));
  pulseGeo.setAttribute('aColor', new THREE.BufferAttribute(pulseCol, 3));
  pulseGeo.setAttribute('aSize', new THREE.BufferAttribute(pulseSize, 1));
  pulseGeo.setAttribute('aAlpha', new THREE.BufferAttribute(pulseAlpha, 1));
  const pulseSys = new THREE.Points(pulseGeo, makeParticleMat());
  bridgeGroup.add(pulseSys);

  // ═══════════════════════════════════════════════
  // GLOBE (Earth base — appears first, bridge stacks on top)
  // ═══════════════════════════════════════════════
  const globeGroup = new THREE.Group();
  globeGroup.position.set(0, 0, 0);  // centered — star builds inside
  // Wireframe sphere (massive, fills bottom of screen)
  const globeWireMat = new THREE.MeshBasicMaterial({
    color: 0x8855dd, transparent:true, opacity:0.06,
    wireframe:true, blending:AB, depthWrite:false
  });
  globeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(globeR, 64, 48), globeWireMat));
  // Inner glow sphere
  const globeGlowMat = gMat(0xb07aff, 0.01);
  globeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(globeR * 0.98, 48, 32), globeGlowMat));
  // Latitude accent rings (visible on the curved surface)
  const globeRingMats = [];
  [0.08, 0.15, 0.25].forEach(lat => {
    const r = globeR * Math.sin(lat * Math.PI);
    const y = globeR * Math.cos(lat * Math.PI);
    const ringPts = [];
    for(let i=0; i<=128; i++){
      const a = (i/128) * Math.PI * 2;
      ringPts.push(new THREE.Vector3(Math.cos(a)*r, y, Math.sin(a)*r));
    }
    const ringGeo = new THREE.BufferGeometry().setFromPoints(ringPts);
    const ringMat = eMat(0xd4a0ff, 0.12);
    globeRingMats.push(ringMat);
    globeGroup.add(new THREE.Line(ringGeo, ringMat));
  });
  scene.add(globeGroup);

  // ═══════════════════════════════════════════════
  // NEBULA PARTICLES
  // ═══════════════════════════════════════════════
  const nN = 800;
  const nPos=new Float32Array(nN*3), nCol=new Float32Array(nN*3);
  const nSize=new Float32Array(nN), nAlpha=new Float32Array(nN);
  const nOrig=new Float32Array(nN*3), nVel=new Float32Array(nN*3);
  const clusters=[
    {cx:-42,cy:24,cz:-18,r:16,ci:0},{cx:38,cy:30,cz:-24,r:14,ci:2},
    {cx:0,cy:-6,cz:-30,r:18,ci:1},{cx:-30,cy:40,cz:-34,r:11,ci:4},{cx:52,cy:10,cz:-14,r:13,ci:5}
  ];
  for(let i=0;i<nN;i++){
    let x,y,z,col;
    if(i<500){
      const cl=clusters[i%clusters.length];
      const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
      const r=cl.r*Math.pow(Math.random(),0.4);
      x=cl.cx+r*Math.sin(ph)*Math.cos(th); y=cl.cy+r*Math.sin(ph)*Math.sin(th); z=cl.cz+r*Math.cos(ph);
      col=palette[cl.ci];
      nSize[i]=(1-r/cl.r*0.5)*(1.5+Math.random()*3);
      nAlpha[i]=(1-r/cl.r*0.6)*(0.08+Math.random()*0.16);
    } else {
      x=(Math.random()-0.5)*180; y=Math.random()*60-10; z=(Math.random()-0.5)*80-10;
      col=palette[Math.floor(Math.random()*palette.length)];
      nSize[i]=0.3+Math.random()*1.5;
      nAlpha[i]=0.03+Math.random()*0.12;
    }
    nPos[i*3]=x; nPos[i*3+1]=y; nPos[i*3+2]=z;
    nOrig[i*3]=x; nOrig[i*3+1]=y; nOrig[i*3+2]=z;
    const v=0.12;
    nCol[i*3]=Math.min(1,col[0]+(Math.random()-.5)*v);
    nCol[i*3+1]=Math.min(1,col[1]+(Math.random()-.5)*v);
    nCol[i*3+2]=Math.min(1,col[2]+(Math.random()-.5)*v);
    nVel[i*3]=(Math.random()-.5)*0.015;
    nVel[i*3+1]=(Math.random()-.5)*0.015;
    nVel[i*3+2]=(Math.random()-.5)*0.008;
  }
  const nGeo=new THREE.BufferGeometry();
  nGeo.setAttribute('position', new THREE.BufferAttribute(nPos, 3));
  nGeo.setAttribute('aColor', new THREE.BufferAttribute(nCol, 3));
  nGeo.setAttribute('aSize', new THREE.BufferAttribute(nSize, 1));
  nGeo.setAttribute('aAlpha', new THREE.BufferAttribute(nAlpha, 1));
  scene.add(new THREE.Points(nGeo, makeParticleMat()));

  // ═══════════════════════════════════════════════
  // AURORA RIBBONS
  // ═══════════════════════════════════════════════
  const ribC=[0xb07aff,0x8855dd,0xb07aff,0xcc66ff,0x7744cc,0xd4a0ff];
  const ribbons=[];
  for(let r=0;r<6;r++){
    const pts=[],sg=100;
    const by=(r-3)*6+(Math.random()-.5)*10, bz=-20-Math.random()*35;
    const amp=3+Math.random()*6, freq=0.4+Math.random()*1.2, ph=Math.random()*Math.PI*2;
    for(let i=0;i<=sg;i++){
      const t=i/sg;
      pts.push(new THREE.Vector3((t-.5)*140, by+Math.sin(t*Math.PI*freq+ph)*amp, bz+Math.cos(t*Math.PI*freq*.6+ph)*4));
    }
    const curve=new THREE.CatmullRomCurve3(pts);
    const geo=new THREE.BufferGeometry().setFromPoints(curve.getPoints(sg*2));
    const mat=eMat(ribC[r], 0.02+Math.random()*0.02);
    scene.add(new THREE.Line(geo,mat));
    ribbons.push({geo,mat,speed:0.1+Math.random()*0.25});
  }

  // ═══════════════════════════════════════════════
  // BUILD PARTICLES (converge to bridge)
  // ═══════════════════════════════════════════════
  const bN = Math.min(Math.floor(buildTargets.length/3), 500);
  const bPos=new Float32Array(bN*3), bTgt=new Float32Array(bN*3), bScat=new Float32Array(bN*3);
  const bCol=new Float32Array(bN*3), bSize=new Float32Array(bN), bAlphaArr=new Float32Array(bN);

  for(let i=0;i<bN;i++){
    const ti=i*3;
    bTgt[ti]=buildTargets[ti]||(Math.random()-.5)*starR*2;
    bTgt[ti+1]=buildTargets[ti+1]||Math.random()*starR;
    bTgt[ti+2]=buildTargets[ti+2]||0;
    const ang=Math.random()*Math.PI*2, dist=50+Math.random()*80;
    bScat[ti]=bTgt[ti]+Math.cos(ang)*dist;
    bScat[ti+1]=bTgt[ti+1]+(Math.random()-.5)*60;
    bScat[ti+2]=bTgt[ti+2]+Math.sin(ang)*dist*(Math.random()-.5);
    bPos[ti]=bScat[ti]; bPos[ti+1]=bScat[ti+1]; bPos[ti+2]=bScat[ti+2];
    const c=palette[i%palette.length];
    bCol[ti]=c[0]; bCol[ti+1]=c[1]; bCol[ti+2]=c[2];
    bSize[i]=1.5+Math.random()*2.5;
    bAlphaArr[i]=0.3+Math.random()*0.4;
  }
  const bGeo=new THREE.BufferGeometry();
  bGeo.setAttribute('position', new THREE.BufferAttribute(bPos, 3));
  bGeo.setAttribute('aColor', new THREE.BufferAttribute(bCol, 3));
  bGeo.setAttribute('aSize', new THREE.BufferAttribute(bSize, 1));
  bGeo.setAttribute('aAlpha', new THREE.BufferAttribute(bAlphaArr, 1));
  scene.add(new THREE.Points(bGeo, makeParticleMat()));

  // ═══════════════════════════════════════════════
  // FLOATING ORBS
  // ═══════════════════════════════════════════════
  const orbs=[];
  for(let i=0;i<8;i++){
    const c=palette[i%palette.length], r=0.4+Math.random()*0.8;
    const mat=gMat(new THREE.Color(c[0],c[1],c[2]), 0.02+Math.random()*0.025);
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(r,12,12), mat);
    mesh.position.set((Math.random()-.5)*90, Math.random()*45, (Math.random()-.5)*40-10);
    scene.add(mesh);
    const hm=gMat(new THREE.Color(c[0],c[1],c[2]), 0.006);
    mesh.add(new THREE.Mesh(new THREE.SphereGeometry(r*4,8,8), hm));
    orbs.push({mesh,mat,bOp:mat.opacity, ox:mesh.position.x,oy:mesh.position.y,oz:mesh.position.z,
      phase:Math.random()*Math.PI*2, speed:0.3+Math.random()*1.2});
  }

  // ═══════════════════════════════════════════════
  // AMBIENT LIGHT
  // ═══════════════════════════════════════════════
  scene.add(new THREE.AmbientLight(0x060818, 0.15));
  const dLight = new THREE.DirectionalLight(0x0a1030, 0.1);
  dLight.position.set(0, 30, 20);
  scene.add(dLight);

  // Sort: by phase, then Y position (bottom-up stacking), then sub-index
  buildElems.sort((a, b) => a.phase - b.phase || a.origY - b.origY || a.sub - b.sub);
  // Grouped elements (same phase+sub) appear together as one unit
  let _lastKey = '', _lastOrd = 0;
  buildElems.forEach((e, i) => {
    const key = e.phase + '|' + e.sub;
    if(key === _lastKey){ e.order = _lastOrd; }
    else { e.order = i / buildElems.length; _lastOrd = e.order; _lastKey = key; }
  });
  bridgeMats.sort((a, b) => a.phase - b.phase || a.sub - b.sub);
  bridgeMats.forEach((m, i) => { m.order = i / bridgeMats.length; });
  // Hide everything initially
  buildElems.forEach(e => { e.grp.visible = false; e.mats.forEach(m => { m.mat.opacity = 0; }); });
  bridgeMats.forEach(m => { m.mat.opacity = 0; });

  // ═══════════════════════════════════════════════
  // ANIMATION — SLOW BUILD + MOUSE 360°
  // ═══════════════════════════════════════════════
  let frame = 0;
  const startTime = Date.now();
  const white = new THREE.Color(0xffffff);
  const BUILD_DUR = 10;     // fast build (테스트용, 나중에 조정)
  const info = document.getElementById('info');

  // Mouse-based 360° orbit + zoom
  let mouseAngle = 0, mouseY = 0.5, camZoom = 1;
  let isDragging = false, lastMX = 0, lastMY = 0;
  canvas.addEventListener('mousedown', e => {
    isDragging = true; lastMX = e.clientX; lastMY = e.clientY;
    document.body.style.cursor = 'grabbing';
  });
  window.addEventListener('mouseup', () => {
    isDragging = false;
    document.body.style.cursor = 'grab';
  });
  window.addEventListener('mousemove', e => {
    if(!isDragging) return;
    mouseAngle += (e.clientX - lastMX) * 0.005;
    mouseY = Math.max(0.05, Math.min(0.95, mouseY - (e.clientY - lastMY) * 0.003));
    lastMX = e.clientX; lastMY = e.clientY;
  });
  // Touch support
  canvas.addEventListener('touchstart', e => {
    isDragging = true; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
  }, {passive:true});
  window.addEventListener('touchend', () => { isDragging = false; });
  window.addEventListener('touchmove', e => {
    if(!isDragging) return;
    mouseAngle += (e.touches[0].clientX - lastMX) * 0.005;
    mouseY = Math.max(0.05, Math.min(0.95, mouseY - (e.touches[0].clientY - lastMY) * 0.003));
    lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
  }, {passive:true});
  // Scroll wheel zoom
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    camZoom = Math.max(0.4, Math.min(2.5, camZoom + e.deltaY * 0.001));
  }, {passive:false});

  window.addEventListener('resize', ()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    R.setSize(innerWidth,innerHeight);
  });

  function animate(){
    requestAnimationFrame(animate);
    frame++;
    const t = Date.now()*0.001;
    const elapsed = (Date.now() - startTime) / 1000;

    // ── LOGO TRANSFORM TIMING ──
    const LOGO_START = BUILD_DUR + 2; // 2s pause after build
    const LOGO_DUR = 8;
    const logoT = Math.max(0, Math.min(1, (elapsed - LOGO_START) / LOGO_DUR));
    const logoEase = logoT * logoT * (3 - 2 * logoT); // smoothstep

    // ── MOUSE → 360° CAMERA ORBIT ──
    const camDist = 100 * camZoom + Math.sin(t*0.05)*2;
    const camH = mouseY * 30 - 5 + Math.cos(t*0.08)*1.5;
    camera.position.set(
      Math.sin(mouseAngle) * camDist,
      camH,
      Math.cos(mouseAngle) * camDist
    );
    camera.lookAt(0, 0, 0);

    // ── GLOBE (always visible, slow rotation) ──
    globeGroup.rotation.y = t * 0.015;
    // Logo phase: globe becomes more opaque (solid circle feel)
    if(logoT > 0){
      globeWireMat.opacity = 0.06 + 0.14 * logoEase;
      globeGlowMat.opacity = 0.01 + 0.09 * logoEase;
      globeRingMats.forEach(m => { m.opacity = 0.12 + 0.18 * logoEase; });
    }

    // ── BUILD PROGRESS (starts immediately) ──
    const bp = Math.min(1, Math.max(0, elapsed / BUILD_DUR));

    // One-by-one stacking: each block appears in place, bottom to top
    buildElems.forEach(e => {
      const matStart = e.order * 0.97;
      const mp = Math.max(0, Math.min(1, (bp - matStart) / 0.002));
      if(mp <= 0){ e.grp.visible = false; return; }
      e.grp.visible = true;
      // Appear with brief bright flash, then settle to normal opacity
      const fadeIn = Math.min(1, mp * 5);
      const flash = mp < 0.3 ? (1 - mp/0.3) * 2.5 : 0;
      e.mats.forEach(m => { m.mat.opacity = m.base * fadeIn + m.base * flash; });
    });
    // Line elements (cables, markings): individual fade
    bridgeMats.forEach(m => {
      const matStart = m.order * 0.97;
      const mp = Math.max(0, Math.min(1, (bp - matStart) / 0.003));
      m.mat.opacity = m.base * Math.min(1, mp * 3);
    });

    // ── LOGO TRANSFORM: star-bridge turns white ──
    if(logoT > 0){
      // All elements → white color
      buildElems.forEach(e => {
        e.mats.forEach(m => {
          if(!m.origColor) m.origColor = m.mat.color.clone();
          m.mat.color.copy(m.origColor).lerp(white, logoEase);
        });
      });
      bridgeMats.forEach(m => {
        if(!m.origColor) m.origColor = m.mat.color.clone();
        m.mat.color.copy(m.origColor).lerp(white, logoEase);
      });
      // Star fill → solid white
      // Internal structure (ribs, bracing, beams, spines) → fade out
      // Outline cables + tip accents → stay thin
      buildElems.forEach(e => {
        if(e.isFill){
          // Fill becomes solid white
          e.mats.forEach(m => { m.mat.opacity = 0.015 + logoEase * 0.85; });
        } else if(e.phase <= 0.15 || (e.phase >= 0.50 && e.phase <= 0.65)){
          // Spines + internal details → fade out cleanly
          e.mats.forEach(m => { m.mat.opacity = m.mat.opacity * (1 - logoEase * 0.9); });
        } else if(e.phase >= 0.25 && e.phase <= 0.40){
          // Outline cables → stay visible but don't boost
          e.mats.forEach(m => { m.mat.opacity = Math.min(0.3, m.mat.opacity); });
        } else if(e.phase >= 0.90){
          // Tip accents → fade out
          e.mats.forEach(m => { m.mat.opacity = m.mat.opacity * (1 - logoEase * 0.85); });
        }
      });
      // Line materials
      bridgeMats.forEach(m => {
        if(m.phase >= 0.42 && m.phase <= 0.80){
          // Bridge cables + rib/brace lines → fade out
          m.mat.opacity = m.mat.opacity * (1 - logoEase * 0.9);
        } else {
          // Outline lines → keep but don't over-boost
          m.mat.opacity = Math.min(0.25, m.mat.opacity);
        }
      });
    }

    // Update info text
    if(bp < 1) {
      info.textContent = `BUILDING... ${Math.round(bp*100)}%`;
      info.style.opacity = 0.3;
    } else if(logoT <= 0) {
      info.textContent = 'COMPLETE';
      const waitT = elapsed - BUILD_DUR;
      info.style.opacity = Math.max(0, 0.4 * (1 - waitT / 2));
    } else if(logoT < 1) {
      info.textContent = 'TRANSFORMING...';
      info.style.opacity = 0.25;
    } else {
      info.textContent = 'DRAG TO ROTATE';
      const doneT = elapsed - LOGO_START - LOGO_DUR;
      info.style.opacity = Math.max(0, 0.2 * (1 - doneT / 4));
    }

    // ── BUILD PARTICLES ──
    const bpA = bGeo.attributes.position.array;
    const baA = bGeo.attributes.aAlpha.array;
    for(let i=0;i<bN;i++){
      const ti=i*3;
      const stag = (i%80)/80*0.4;
      const lp = Math.max(0, Math.min(1, (bp-stag)/(1-stag)));
      const le = lp*lp*(3-2*lp);
      bpA[ti]  =bScat[ti]  +(bTgt[ti]  -bScat[ti])  *le;
      bpA[ti+1]=bScat[ti+1]+(bTgt[ti+1]-bScat[ti+1])*le;
      bpA[ti+2]=bScat[ti+2]+(bTgt[ti+2]-bScat[ti+2])*le;
      baA[i] = bAlphaArr[i]*(1-le*0.85) * (1 - logoEase);
    }
    bGeo.attributes.position.needsUpdate=true;
    bGeo.attributes.aAlpha.needsUpdate=true;

    // ── ENERGY PULSE (after 60% built) ──
    const ppA = pulseGeo.attributes.position.array;
    const paA = pulseGeo.attributes.aAlpha.array;
    const pulseActive = Math.max(0, (bp - 0.6) / 0.4);
    const pSpd = 0.15 + pulseActive*0.3;
    for(let i=0;i<pulseN;i++){
      pulseT[i] += pSpd*(0.003+Math.random()*0.001);
      if(pulseT[i]>1) pulseT[i]-=1;
      const cable = allCurves[pulseCurveIdx[i]];
      const pt = cable[Math.min(Math.floor(pulseT[i]*(cable.length-1)), cable.length-1)];
      ppA[i*3]=pt.x; ppA[i*3+1]=pt.y; ppA[i*3+2]=pt.z;
      paA[i] = pulseAlpha[i]*Math.sin(pulseT[i]*Math.PI)*pulseActive * (1 - logoEase);
    }
    pulseGeo.attributes.position.needsUpdate=true;
    pulseGeo.attributes.aAlpha.needsUpdate=true;

    // ── NEBULA ──
    const npA=nGeo.attributes.position.array;
    const naA=nGeo.attributes.aAlpha.array;
    for(let i=0;i<nN;i++){
      npA[i*3]  =nOrig[i*3]  +Math.sin(t*0.25+i*0.08)*nVel[i*3]*60;
      npA[i*3+1]=nOrig[i*3+1]+Math.cos(t*0.2+i*0.11)*nVel[i*3+1]*60;
      npA[i*3+2]=nOrig[i*3+2]+Math.sin(t*0.15+i*0.06)*nVel[i*3+2]*40;
      if(i%4===0) naA[i]=nAlpha[i]*(0.55+Math.sin(t*1.8+i*0.4)*0.45) * (1 - logoEase);
    }
    nGeo.attributes.position.needsUpdate=true;
    if(frame%2===0) nGeo.attributes.aAlpha.needsUpdate=true;

    // ── RIBBONS ──
    ribbons.forEach((rb,ri)=>{
      rb.mat.opacity=(0.018+Math.sin(t*0.35+ri*0.7)*0.015) * (1 - logoEase);
      const a=rb.geo.attributes.position.array;
      for(let i=0;i<a.length/3;i++) a[i*3+1]+=Math.sin(t*rb.speed+(i/(a.length/3))*5+ri)*0.01;
      rb.geo.attributes.position.needsUpdate=true;
    });

    // ── ORBS ──
    orbs.forEach(o=>{
      o.mesh.position.x=o.ox+Math.sin(t*0.18+o.phase)*6;
      o.mesh.position.y=o.oy+Math.cos(t*0.13+o.phase)*4;
      o.mesh.position.z=o.oz+Math.sin(t*0.09+o.phase*1.7)*3;
      o.mat.opacity=o.bOp*(0.5+Math.sin(t*o.speed+o.phase)*0.5) * (1 - logoEase);
    });

    R.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
